name: master

on:
    workflow_dispatch:
#    push: #수동 실행 위주로 사용하려면 주석 유지, 커밋 푸시 시 자동 배포하려면 주석 해제
#      branches:
#        - master

jobs:
    # 소스코드 변동 여부 확인
    check:
        runs-on: ubuntu-latest
        outputs:
            changed: ${{ steps.changed-files.outputs.changed }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 2
            - name: Check for changes
              id: changed-files
              run: |
                  if git diff --quiet HEAD^ HEAD -- \
                    src/main build.gradle; then
                    echo "changed=false" >> $GITHUB_OUTPUT
                  else
                    echo "changed=true" >> $GITHUB_OUTPUT
                  fi
              
    # 프로젝트 빌드 (JAR 생성)
    build:
        needs: check
        if: needs.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
        
            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                java-version: '21'
                distribution: 'temurin'
                cache: gradle
        
            - name: Grant execute permission for gradlew
              run: chmod +x gradlew
        
            - name: Build with Gradle
              run: ./gradlew clean bootJar -x test
            
            - name: Upload Build Artifact
              uses: actions/upload-artifact@v4
              with:
                name: schedulerJob-jar
                path: build/libs/Scheduler-Job.jar
                retention-days: 1
    
    # AWS Lightsail 실서버 배포
    deploy:
        needs: [check, build]
        if: needs.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              
            - name: Download Build Jar
              uses: actions/download-artifact@v4
              with:
                name: schedulerJob-jar
                path: build/libs/
                
            # Lightsail로 JAR 파일 전송 (SCP)
            - name: Copy Jar to Lightsail
              uses: appleboy/scp-action@v0.1.7
              with:
                host: ${{ secrets.LIGHTSAIL_HOST }}
                username: ${{ secrets.LIGHTSAIL_USERNAME }}
                key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
                source: "build/libs/Scheduler-Job.jar"
                target: "/home/ubuntu/scheduler-job"
                strip_components: 2
 
            # Lightsail 서버에서 PM2로 Java API 백그라운드 구동
            - name: SSH to Lightsail and deploy Java Scheduler
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.LIGHTSAIL_HOST }}
                username: ${{ secrets.LIGHTSAIL_USERNAME }}
                key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
                script: |
                  mkdir -p /home/ubuntu/scheduler-job
                  cd /home/ubuntu/scheduler-job
                  
                  # PM2를 이용하여 Java Scheduler 실행 및 무중단 재시작
                  (pm2 reload "scheduler-job" --update-env || pm2 start "java -jar -Dspring.profiles.active=prod Scheduler-Job.jar" --name "scheduler-job") && pm2 save
            
    # 소스코드 변경사항 없이 수동 빌드/재시작 시 작동
    restart:
        needs: check
        if: needs.check.outputs.changed == 'false' && github.event_name != 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - name: SSH to Lightsail and restart PM2
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.LIGHTSAIL_HOST }}
                username: ${{ secrets.LIGHTSAIL_USERNAME }}
                key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
                script: |
                  pm2 restart "scheduler-job"
